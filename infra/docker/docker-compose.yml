services:
  adip-api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    command: python -m adip.api --host 0.0.0.0 --port 8010
    ports:
      - "8010:8010"
    volumes:
      - ../../data:/app/data
      - ../../config:/app/config:ro
      - ../../prompts:/app/prompts:ro

  adip-smoke:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    command: python -m pytest
