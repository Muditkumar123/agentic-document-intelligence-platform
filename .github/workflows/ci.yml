name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check src tests

  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"
      - name: Run unit tests
        run: pytest -q

  eval-gate:
    name: Eval quality gate
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"
      - name: Ingest evaluation corpus (real public docs, markdown-only)
        run: >-
          python -m adip.mlops.run_ingestion
          --input data/eval/raw
          --output data/processed/chunks.jsonl
          --chunk-size 800 --chunk-overlap 120
          --metrics-output data/monitoring/ingestion_metrics.json
      - name: Retrieval eval (builds the index, TF-IDF, hermetic)
        run: >-
          python -m adip.mlops.run_rag_eval
          --chunks data/processed/chunks.jsonl
          --index data/processed/vector_index
          --golden data/eval/golden_qa.jsonl
          --backend tfidf --no-faiss --reranker none --top-k 5
          --metrics-output data/monitoring/rag_eval_metrics.json
      - name: Generation eval (deterministic extractive writer, evidence-gated abstention)
        run: >-
          python -m adip.mlops.run_generation_eval
          --index data/processed/vector_index
          --golden data/eval/golden_qa.jsonl
          --abstention-threshold 0.10
          --metrics-output data/monitoring/generation_eval_metrics.json
          --report-output data/monitoring/generation_eval_report.json
      - name: Enforce eval thresholds
        run: python -m adip.mlops.eval_gate --thresholds ci/eval_thresholds.json
      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-reports
          path: |
            data/monitoring/rag_eval_metrics.json
            data/monitoring/generation_eval_metrics.json
            data/monitoring/generation_eval_report.json
          if-no-files-found: ignore

  docker:
    name: Docker image build + smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - name: Build production image
        run: docker build -t adip:ci -f infra/docker/Dockerfile .
      - name: Run container and smoke-test endpoints
        run: |
          docker run -d --name adip -p 8010:8010 adip:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8010/health >/dev/null 2>&1; then break; fi
            sleep 2
          done
          echo "health:"; curl -fsS http://localhost:8010/health
          curl -fsS http://localhost:8010/health | grep -q '"status":"ok"'
          curl -fsS -o /dev/null -w "dashboard HTTP %{http_code}\n" http://localhost:8010/
          curl -fsS -o /dev/null -w "gen-eval HTTP %{http_code}\n" http://localhost:8010/monitoring/generation-eval
      - name: Container logs on failure
        if: failure()
        run: docker logs adip || true
      - name: Cleanup
        if: always()
        run: docker rm -f adip || true
